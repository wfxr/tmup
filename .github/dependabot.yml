version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    labels:
    - dependencies
    commit-message:
      prefix: "ci"
      include: "scope"
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels:
    - dependencies
    commit-message:
      prefix: "deps"
      include: "scope"
