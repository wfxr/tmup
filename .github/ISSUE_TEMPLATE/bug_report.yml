name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a `tmup.kdl` with ...
        2. Run `tmup sync`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your `tmup.kdl` (relevant parts).
      render: kdl

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide the following info:
      value: |
        - OS:
        - tmux version:
        - tmup version:
        - Shell:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste any relevant log output or error messages.
      render: text
